name: Build & Push Justin Courtlist to Artifactory
permissions:
  contents: write
on:
  schedule:
  # Every 30 days
    - cron: "* * 1 * *"
  push:
    branches:
      - main
  workflow_dispatch: 

env:
  IMAGE_NAME: justin-courtlist
  WORKING_DIRECTORY: .
  BRANCH_NAME: develop
  IMAGE_TAG: dev

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Login to Artifactory
        uses: docker/login-action@v1
        with:
          registry: artifacts.developer.gov.bc.ca
          username: ${{ secrets.ARTIFACTORY_USERNAME }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}
      
      # Get SHORT_SHA to tag images
      - name: Get short SHA
        id: short_sha
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "Short SHA: $SHORT_SHA"

      - name: Docker Build and Push Courtlist Image to Artifactory
        working-directory: ${{env.WORKING_DIRECTORY}}
        run: |
          docker build -t ${{ env.IMAGE_NAME }} .
          docker tag ${{ env.IMAGE_NAME }} artifacts.developer.gov.bc.ca/jwub-justin/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push artifacts.developer.gov.bc.ca/jwub-justin/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          
      #   Run Vulnerability Scan usinig Trivy scanner
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: artifacts.developer.gov.bc.ca/jwub-justin/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: 'table'
          ignore-unfixed: true
          limit-severities-for-sarif: true
          severity: HIGH,CRITICAL
      
      - name: Set GitOps SSH Key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.COURTLIST_SSH_KEY }}

      - name: Update Helm Values and Commit
        id: helm
        run: |
          
          # Commit and push the changes
          git config --global user.email "actions@github.com"
          git config --global user.name "Courtlist GitHub Actions"
          git clone -b ${{ env.BRANCH_NAME }} --single-branch git@github.com:bcgov-c/tenant-gitops-wuboml.git
          
          # Navigate to the directory containing your Helm values file for the environment develop -> DEV, test -> test
          cd tenant-gitops-wuboml/charts

          # Update the Helm values file with the new image tag and version
          DATETIME=$(date +'%Y-%m-%d %H:%M:%S')  # Get current date and time

          sed -i "s/cltag: .*/cltag: ${{ env.IMAGE_TAG }} # Image Updated on $DATETIME/" ../deploy/${{ env.IMAGE_TAG }}_values.yaml
          sed -i "s/clversion: .*/clversion: ${{ steps.short_sha.outputs.SHORT_SHA }} # Version Updated on $DATETIME/" ../deploy/${{ env.IMAGE_TAG }}_values.yaml
          
          git add .
          
          git add ../deploy/${{ env.IMAGE_TAG }}_values.yaml
          
          # Repackage Helm Chart      

          cd gitops

          helm dependency build
          
          cd charts

          git add .
          
          git commit -m "Update Courtlist image tag"
          git push origin ${{ env.BRANCH_NAME }} # Update the branch name as needed